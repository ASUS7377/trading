<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>
Добро пожаловать
</title>

<style>

body{
    background:#020817;
    color:white;
    font-family:Segoe UI;
}

.container{

    width:700px;

    margin:60px auto;

    background:#1e293b;

    padding:40px;

    border-radius:20px;
}

h1{
    margin-bottom:15px;
}

p{
    color:#94a3b8;
    margin-bottom:30px;
}

input{

    width:100%;

    padding:16px;

    margin-bottom:20px;

    border:none;

    border-radius:12px;

    background:#0f172a;

    color:white;
}

button{

    width:100%;

    padding:18px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

    <h1>
        Добро пожаловать,
        {{ profile.full_name }}
    </h1>

    <p>
        Завершите настройку аккаунта
    </p>

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

        <input
            type="number"
            step="0.01"
            name="initial_balance"
            placeholder="Начальный депозит"
            required
        >

        <input
            type="number"
            step="0.01"
            name="target_balance"
            placeholder="Цель"
            required
        >

        <input
            type="file"
            name="avatar"
        >

        <button>

            Начать работу

        </button>

    </form>

</div>

</body>

</html>
