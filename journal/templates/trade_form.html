
{% extends 'base.html' %}

{% block content %}

<style>

.trade-page{
    max-width:1200px;
    margin:auto;
}

.trade-header{
    margin-bottom:30px;
}

.trade-header h1{
    font-size:42px;
    margin-bottom:10px;
}

.trade-header p{
    color:#94a3b8;
}

.trade-card{
    background:#1e293b;
    border-radius:30px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.trade-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:10px;
    color:#cbd5e1;
    font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:16px;
    padding:16px;
    color:white;
    font-size:16px;
}

.form-group textarea{
    min-height:160px;
}

.full-width{
    grid-column:1 / -1;
}

.trade-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.trade-buttons input{
    display:none;
}

.buy-btn,
.sell-btn{
    height:75px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:18px;
    font-size:24px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.buy-btn{
    background:#16a34a;
    color:white;
}

.sell-btn{
    background:#dc2626;
    color:white;
}

.buy-btn:hover,
.sell-btn:hover{
    transform:translateY(-3px);
}

#buy:checked + .buy-btn{
    box-shadow:0 0 0 4px rgba(34,197,94,.4);
}

#sell:checked + .sell-btn{
    box-shadow:0 0 0 4px rgba(239,68,68,.4);
}

.save-btn{
    width:100%;
    margin-top:25px;
    border:none;
    border-radius:18px;
    padding:20px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    background:#2563eb;
    color:white;
    transition:.3s;
}

.save-btn:hover{
    background:#1d4ed8;
}

@media(max-width:900px){

    .trade-grid{
        grid-template-columns:1fr;
    }

    .trade-header h1{
        font-size:32px;
    }

}

</style>

<div class="trade-page">

    <div class="trade-header">

        <h1>
            Добавить сделку
        </h1>

        <p>
            Добавьте новую сделку в торговый журнал
        </p>

    </div>

    <div class="trade-card">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="trade-grid">

                <div class="form-group">

                    <label>Дата сделки</label>

                    {{ form.date }}

                </div>

                <div class="form-group">

                    <label>Актив</label>

                    {{ form.symbol }}

                </div>

                <div class="form-group">

                    <label>Лот</label>

                    {{ form.lot_size }}

                </div>

                <div class="form-group">

                    <label>Цена входа</label>

                    {{ form.entry_price }}

                </div>

                <div class="form-group">

                    <label>Цена выхода</label>

                    {{ form.exit_price }}

                </div>

                <div class="form-group">

                    <label>Прибыль / Убыток ($)</label>

                    {{ form.profit }}

                </div>

                <div class="form-group full-width">

                    <label>Тип сделки</label>

                    <div class="trade-buttons">

                        <input
                            type="radio"
                            id="buy"
                            name="trade_type"
                            value="BUY"
                            required>

                        <label
                            for="buy"
                            class="buy-btn">

                            BUY

                        </label>

                        <input
                            type="radio"
                            id="sell"
                            name="trade_type"
                            value="SELL">

                        <label
                            for="sell"
                            class="sell-btn">

                            SELL

                        </label>

                    </div>

                </div>

                <div class="form-group full-width">

                    <label>Комментарий</label>

                    {{ form.comment }}

                </div>

                <div class="form-group full-width">

                    <label>Скриншот сделки</label>

                    {{ form.screenshot }}

                </div>

            </div>

            <button
                type="submit"
                class="save-btn">

                Сохранить сделку

            </button>

        </form>

    </div>

</div>

{% endblock %}
