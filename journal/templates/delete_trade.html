
{% extends 'base.html' %}

{% block content %}

<style>

.delete-card{

    max-width:700px;

    margin:80px auto;

    background:#1e293b;

    border-radius:24px;

    padding:40px;

    text-align:center;
}

.delete-card h1{

    color:white;

    margin-bottom:20px;
}

.delete-card p{

    color:#cbd5e1;

    font-size:18px;

    margin-bottom:30px;
}

.trade-info{

    background:#0f172a;

    padding:20px;

    border-radius:16px;

    margin-bottom:30px;
}

.trade-info h2{

    color:white;

    margin-bottom:10px;
}

.trade-info .profit{

    color:#22c55e;

    font-size:28px;

    font-weight:700;
}

.buttons{

    display:flex;

    gap:20px;
}

.cancel-btn{

    flex:1;

    background:#334155;

    color:white;

    text-decoration:none;

    padding:16px;

    border-radius:14px;

    font-weight:700;

    text-align:center;
}

.delete-btn{

    flex:1;

    background:#dc2626;

    color:white;

    border:none;

    padding:16px;

    border-radius:14px;

    font-weight:700;

    cursor:pointer;
}

@media(max-width:768px){

    .delete-card{

        margin:20px;

        padding:25px;
    }

    .buttons{

        flex-direction:column;
    }

}

</style>

<div class="delete-card">

    <h1>
        Удалить сделку?
    </h1>

    <p>
        Это действие нельзя отменить.
    </p>

    <div class="trade-info">

        <h2>
            {{ trade.symbol }}
        </h2>

        <p>
            {{ trade.trade_type }}
        </p>

        <div class="profit">

            ${{ trade.profit }}

        </div>

    </div>

    <form method="post">

        {% csrf_token %}

        <div class="buttons">

            <a
                href="{% url 'trade_detail' trade.pk %}"
                class="cancel-btn"
            >

                Отмена

            </a>

            <button
                type="submit"
                class="delete-btn"
            >

                Удалить

            </button>

        </div>

    </form>

</div>

{% endblock %}
