
{% extends 'base.html' %}

{% block content %}
<style>

.profile-page{

    width:100%;
}

.profile-card{

    background:#1e293b;

    border-radius:24px;

    padding:40px;

    max-width:1200px;

    margin:0 auto;
}

.profile-card h1{

    color:white;

    margin-bottom:30px;

    font-size:42px;
}

.form-group{

    margin-bottom:20px;
}

.form-group label{

    display:block;

    color:white;

    margin-bottom:10px;

    font-size:16px;

    font-weight:600;
}

.form-control{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#0f172a;

    color:white;

    font-size:16px;
}

textarea{

    width:100%;

    min-height:140px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#0f172a;

    color:white;
}

.trade-buttons{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-top:10px;
}

.trade-buttons input{

    display:none;
}

.buy-btn{

    background:#16a34a;

    color:white;

    text-align:center;

    padding:20px;

    border-radius:16px;

    cursor:pointer;

    font-size:28px;

    font-weight:700;
}

.sell-btn{

    background:#dc2626;

    color:white;

    text-align:center;

    padding:20px;

    border-radius:16px;

    cursor:pointer;

    font-size:28px;

    font-weight:700;
}

.save-btn{

    width:100%;

    background:#2563eb;

    color:white;

    border:none;

    border-radius:16px;

    padding:18px;

    font-size:20px;

    font-weight:700;

    margin-top:25px;

    cursor:pointer;
}

.save-btn:hover{

    opacity:0.9;
}

.current-image{

    width:100%;

    max-width:800px;

    border-radius:20px;

    margin-top:20px;
}

@media(max-width:768px){

    .profile-card{

        padding:20px;
    }

    .profile-card h1{

        font-size:32px;
    }

    .trade-buttons{

        grid-template-columns:1fr;
    }

    .buy-btn,
    .sell-btn{

        font-size:22px;

        padding:16px;
    }

    .save-btn{

        font-size:18px;
    }

    .current-image{

        max-width:100%;
    }

}

</style>
<div class="profile-page">

    <div class="profile-card">

        <h1>
            Редактировать сделку
        </h1>

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-group">

                <label>
                    Дата сделки
                </label>

                {{ form.date }}

            </div>

            <div class="form-group">

                <label>
                    Актив
                </label>

                {{ form.symbol }}

            </div>

            <div class="form-group">

                <label>
                    Лот
                </label>

                {{ form.lot_size }}

            </div>

            <div class="form-group">

                <label>
                    Цена входа
                </label>

                {{ form.entry_price }}

            </div>

            <div class="form-group">

                <label>
                    Цена выхода
                </label>

                {{ form.exit_price }}

            </div>

            <div class="form-group">

                <label>
                    Тип сделки
                </label>

                <div class="trade-buttons">

                    <input
                        type="radio"
                        id="buy"
                        name="trade_type"
                        value="BUY"
                        {% if trade.trade_type == 'BUY' %}
                        checked
                        {% endif %}
                    >

                    <label
                        for="buy"
                        class="buy-btn">

                        BUY

                    </label>

                    <input
                        type="radio"
                        id="sell"
                        name="trade_type"
                        value="SELL"
                        {% if trade.trade_type == 'SELL' %}
                        checked
                        {% endif %}
                    >

                    <label
                        for="sell"
                        class="sell-btn">

                        SELL

                    </label>

                </div>

            </div>

            <div class="form-group">

                <label>
                    Прибыль / Убыток
                </label>

                {{ form.profit }}

            </div>

            <div class="form-group">

                <label>
                    Комментарий
                </label>

                {{ form.comment }}

            </div>

            <div class="form-group">

                <label>
                    Скриншот
                </label>

                {{ form.screenshot }}

            </div>

            {% if trade.screenshot %}

            <div
                style="
                    margin-top:20px;
                "
            >

                <img
                    src="{{ trade.screenshot.url }}"
                    style="
                        width:100%;
                        max-width:700px;
                        border-radius:20px;
                    "
                >

            </div>

            {% endif %}

            <button
                type="submit"
                class="save-btn"
            >

                Сохранить изменения

            </button>

        </form>

    </div>

</div>

{% endblock %}
